services:
  - type: web
    name: hostel-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        value: mongodb://your_mongo_atlas_uri  # Replace with your MongoDB Atlas URI
      - key: JWT_SECRET
        value: your_secure_jwt_secret  # Replace with a secure secret
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PORT
        value: 10000  # Render assigns this port automatically