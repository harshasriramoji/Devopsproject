<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HostelPro Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-p2c8Zg7S4G3U7n1t2h6VqjP9qeKU2KvLx8vQ0K5s8bv6jSm7hGscrqY4sS0vB2qbPZDJkTXgqQf8D+S1xZ7j0Q==" crossorigin="anonymous" referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
    <div class="auth-page">
        <div class="auth-panel">
            <div class="brand-bar">
                <span class="brand-mark">H</span>
                <div>
                    <div class="brand-title">HostelPro</div>
                    <p class="brand-subtitle">Secure role-based hostel management access.</p>
                </div>
            </div>

            <div class="auth-copy">
                <h1>Welcome back</h1>
                <p>Sign in to your Admin, Staff, or Student dashboard with smooth access and strong protection.</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-row">
                    <label for="email">Email address</label>
                    <div class="input-group">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="email" class="form-field" placeholder="name@domain.com" required />
                    </div>
                </div>
                <div class="form-row">
                    <label for="password">Password</label>
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" class="form-field" placeholder="Enter password" required />
                    </div>
                </div>
                <div class="form-row role-row">
                    <label>Continue as</label>
                    <div class="role-options">
                        <label class="role-pill selected">
                            <input type="radio" name="role" value="admin" checked />
                            <span><i class="fa-solid fa-user-shield"></i> Admin</span>
                        </label>
                        <label class="role-pill">
                            <input type="radio" name="role" value="staff" />
                            <span><i class="fa-solid fa-user-tie"></i> Staff</span>
                        </label>
                        <label class="role-pill">
                            <input type="radio" name="role" value="student" />
                            <span><i class="fa-solid fa-user-graduate"></i> Student</span>
                        </label>
                    </div>
                </div>
                <button type="submit" class="button-primary">Sign in</button>
                <p id="message" class="form-message"></p>
                <p class="form-footer">New to HostelPro? <a href="/register">Create an account</a></p>
            </form>
        </div>

        <div class="auth-visual">
            <div class="visual-overlay"></div>
            <div class="visual-text">
                <p>Modern dashboard authentication</p>
                <h2>Fast, branded access for every hostel role.</h2>
            </div>
            <div class="visual-hero">
                <div class="hero-card hero-card-1"></div>
                <div class="hero-card hero-card-2"></div>
                <div class="hero-card hero-card-3"></div>
            </div>
        </div>
    </div>
    <script src="/js/config.js"></script>
    <script src="/js/login.js"></script>
</body>

</html>
